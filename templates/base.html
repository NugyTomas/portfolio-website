<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta
            name="viewport"
            content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />

    <link rel="icon" type="image/png" sizes="32x32"
          href="{{ url_for('static', filename='assets/img/logos/icon_logo.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet"/>


    <title>{% block title %}{% endblock %}</title>
</head>
<body class="d-flex flex-column min-vh-100">

<!-- NAVBAR -->
<nav class="fixed-top d-flex flex-wrap flex-row-reverse border-bottom">
    <ul class="nav nav-pills">
        <li class="nav-item"><a href="https://github.com/NugyTomas" target="_blank" class="nav-link">Github</a></li>
        {% if navbar == "contact" %}
        <li class="nav-item"><a href="{{ url_for('contact')}}" class="btn-contact nav-link" aria-current="page">Contact
            Me</a>
            {% elif navbar == "home" %}
        <li class="nav-item"><a href="{{ url_for('home')}}" class="btn-contact nav-link" aria-current="page">Home</a>
            {% endif %}
        </li>
    </ul>
</nav>

<main class="flex-grow-1 pt-5">
    {% block content %}
    {% endblock %}
</main>

<!-- FOOTER -->
<footer class="d-flex justify-content-center align-items-center py-1 border-top">
    <div class="col-md-4 ">
        <p class="mb-3 mb-md-0">© {{current_year}} Tomáš Nguyen</p>
    </div>
    <a href="/" class="mb-3 mb-md-0" aria-label="TNG logo">
        <img src="{{ url_for('static', filename='assets/img/logos/logo.svg')}}" width="75" height="75">
    </a>
    <ul class="nav col-md-4 justify-content-end">
        <li class="ms-4"><a href="https://github.com/NugyTomas" aria-label="Github" target="_blank">
            <img src="{{ url_for('static', filename='assets/img/logos/github.svg') }}" class="svg_logo"/>
        </a></li>
        <li class="ms-4"><a href="https://www.linkedin.com/in/tomáš-nguyen-2407371b5/" aria-label="LinkedIn"
                            target="_blank">
            <img src="{{ url_for('static', filename='assets/img/logos/linkedin.svg') }}" class="svg_logo"/>
        </a></li>
    </ul>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
