{% extends "base.html" %}

{% block title %}
Contact Me | Tomáš Nguyen
{% endblock %}

{% block content %}
<section class="contact pt-5">
    <div class="container text-center">
        <h1 class="mb-5">
            I'm happy that you decided to get in touch with me!<br>Feel free to send me a message. I'll get back to you
            as soon as possible. 🤝
        </h1>
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-4">
                <form action="{{ url_for('contact') }}" method="POST" class="d-flex flex-column">
                    <label for="name">Name</label>
                    <input type="text"
                           id="name"
                           name="name"
                           placeholder="Your name"
                           required
                           autofocus>
                    <label for="email">Email</label>
                    <input type="email"
                           id="email"
                           name="email"
                           placeholder="Your email"
                           required>
                    <label for="message">Message</label>
                    <textarea id="message"
                              name="message"
                              rows="6"
                              placeholder="Write your message..."
                              required></textarea>
                    <button type="submit">
                        Send Message <span>📧</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
